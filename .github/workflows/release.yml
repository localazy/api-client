name: Release

on:
  push:
    branches:
      - main

env:
  NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN_PUBLIC }}
  FORCE_COLOR: '3'

jobs:
  release:
    name: Create Release PR
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '🚀 release:')"
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate token
        id: auth
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.AUTH_APP_ID }}
          private-key: ${{ secrets.AUTH_APP_KEY }}

      - name: Clean pnpm setup cache
        run: rm -rf ~/setup-pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run release script
        run: pnpx @localazy/workflow-scripts create-release-pr .
        env:
          GITHUB_TOKEN: ${{ steps.auth.outputs.token }}

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    if: "contains(github.event.head_commit.message, '🚀 release:')"
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Generate token
        id: auth
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.AUTH_APP_ID }}
          private-key: ${{ secrets.AUTH_APP_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Clean pnpm setup cache
        run: rm -rf ~/setup-pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Determine npm tag
        id: npm-tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if echo "$VERSION" | grep -q '-'; then
            echo "tag=${VERSION#*-}" | sed 's/\..*//' >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        run: pnpm publish --no-git-checks --tag ${{ steps.npm-tag.outputs.tag }} --access public

      - name: Create and push git tag
        id: git-tag
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          TAG="${NAME}@${VERSION}"
          git tag "${TAG}"
          git push origin "${TAG}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        run: pnpx @localazy/workflow-scripts create-github-release "${{ steps.git-tag.outputs.version }}"
        env:
          GITHUB_TOKEN: ${{ steps.auth.outputs.token }}
